{% extends "base.html" %}
{% block title %}Nouveau service — SanteTicket{% endblock %}
{% block content %}
{% include 'partials/nav.html' %}
<div class="max-w-2xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-4">
        <h1 class="font-display font-semibold text-xl text-clinique-encre">Nouveau service médical</h1>
        <a href="{% url 'liste_services' %}" class="text-sm text-clinique-ardoise hover:text-clinique-encre">← Retour</a>
    </div>

    <form method="post" class="bg-white rounded-2xl shadow-sm p-4 space-y-3">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-medium text-clinique-ardoise mb-1">Nom du service</label>
            {{ form.nom }}
        </div>
        <div>
            <label class="block text-xs font-medium text-clinique-ardoise mb-1">Code</label>
            {{ form.code }}
        </div>
        <div>
            <label class="block text-xs font-medium text-clinique-ardoise mb-1">Description</label>
            {{ form.description }}
        </div>
        <div class="flex items-center gap-2">
            {{ form.actif }}
            <label class="text-sm text-clinique-ardoise">Service actif</label>
        </div>
        <button type="submit" class="w-full bg-clinique-bleu text-white rounded-lg py-3 font-medium">
            Créer le service
        </button>
    </form>
</div>
{% endblock %}
