{% extends "base.html" %}
{% block title %}Connexion — SanteTicket{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">🏥</div>
            <h1 class="text-xl font-semibold text-clinique-bleu">SanteTicket</h1>
            <p class="text-sm text-gray-500 mt-1">Connectez-vous à votre espace</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-50 border border-clinique-rouge text-clinique-rouge text-sm rounded-lg p-3 mb-4">
            Identifiants incorrects. Veuillez réessayer.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
                <input type="text" name="username" required
                       class="w-full rounded-lg border border-gray-300 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-clinique-bleu">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                <input type="password" name="password" required
                       class="w-full rounded-lg border border-gray-300 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-clinique-bleu">
            </div>
            <button type="submit"
                    class="w-full bg-clinique-bleu text-white font-medium rounded-lg py-3 hover:bg-blue-700 transition">
                Se connecter
            </button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</div>
{% endblock %}
