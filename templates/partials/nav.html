<nav class="bg-white border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-14">
        <div class="flex items-center gap-6">
            <a href="{% url 'tableau_bord' %}" class="font-display font-semibold text-clinique-bleu">SanteTicket</a>
            <div class="hidden md:flex items-center gap-3">
                <a href="{% url 'tableau_bord' %}" class="flex items-center gap-2 text-sm {% if request.resolver_match.url_name == 'tableau_bord' %}font-medium text-clinique-bleu bg-blue-50{% else %}text-clinique-ardoise hover:text-clinique-encre{% endif %} px-3 py-1.5 rounded-lg">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                    Accueil
                </a>
                <a href="{% url 'liste_tickets' %}" class="flex items-center gap-2 text-sm {% if request.resolver_match.url_name == 'liste_tickets' %}font-medium text-clinique-bleu bg-blue-50{% else %}text-clinique-ardoise hover:text-clinique-encre{% endif %} px-3 py-1.5 rounded-lg">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                    Tickets
                </a>
                <a href="{% url 'liste_patients' %}" class="flex items-center gap-2 text-sm {% if 'patient' in request.resolver_match.url_name %}font-medium text-clinique-bleu bg-blue-50{% else %}text-clinique-ardoise hover:text-clinique-encre{% endif %} px-3 py-1.5 rounded-lg">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    Patients
                </a>
                {% if request.user.profile.role == 'admin_clinique' %}
                <a href="{% url 'liste_services' %}" class="flex items-center gap-2 text-sm {% if 'service' in request.resolver_match.url_name %}font-medium text-clinique-bleu bg-blue-50{% else %}text-clinique-ardoise hover:text-clinique-encre{% endif %} px-3 py-1.5 rounded-lg">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                    Services
                </a>
                {% endif %}
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm text-clinique-ardoise">{{ request.tenant.nom_clinique|default:"Clinique" }}</span>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="w-8 h-8 rounded-full bg-clinique-bleu text-white text-xs font-medium flex items-center justify-center" title="Déconnexion">
                    {{ request.user.first_name|slice:":1"|default:request.user.username|slice:":1"|upper }}
                </button>
            </form>
        </div>
    </div>
</nav>
