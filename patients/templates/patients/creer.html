{% extends "base.html" %}
{% block title %}Créer un patient — SanteTicket{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-4">
    <div class="bg-white rounded-2xl shadow-sm p-4 mb-4 flex items-center justify-between">
        <div class="font-semibold text-clinique-bleu">+ Nouveau patient</div>
        <a href="{% url 'rechercher_patient' %}" class="text-sm text-gray-500">← Retour</a>
    </div>

    <form method="post" class="bg-white rounded-2xl shadow-sm p-4 space-y-3">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
                {{ form.nom }}
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
                {{ form.prenom }}
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone (optionnel)</label>
            {{ form.telephone }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Date de naissance</label>
            {{ form.date_naissance }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
            {{ form.categorie }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Quartier/village</label>
            {{ form.quartier_village }}
        </div>
        <button type="submit" class="w-full bg-clinique-bleu text-white rounded-lg py-3 font-medium">
            Créer le patient
        </button>
    </form>
</div>
{% endblock %}
